name: Firmware Release
on:
  push:
    tags:
      - 'firmware/v*'
jobs:
  build:
    runs-on: proxmox-lxc
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -S . --preset Release
      - name: Build
        run: cmake --build build --preset Release
      - name: Generate checksums
        run: |
          cd build
          sha256sum odsci.bin odsci.hex > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware/build/odsci.bin
            firmware/build/odsci.hex
            firmware/build/checksums.txt
