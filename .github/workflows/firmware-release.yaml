name: Firmware Release
on:
  push:
    tags:
      - 'firmware/v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: proxmox-lxc
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . --preset Release
      - name: Build
        run: cmake --build build --preset Release
      - name: Generate checksums
        run: |
          cd build/Release
          sha256sum odsci.bin odsci.hex > checksums.txt
      - name: Rename binaries
        run: |
          VERSION=${GITHUB_REF_NAME#firmware/}
          mv build/Release/odsci.bin build/Release/odsci-firmware-${VERSION}-stm32f446re.bin
          mv build/Release/odsci.hex build/Release/odsci-firmware-${VERSION}-stm32f446re.hex
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware/build/Release/odsci.bin
            firmware/build/Release/odsci.hex
            firmware/build/Release/checksums.txt
